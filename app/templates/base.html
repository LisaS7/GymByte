<!DOCTYPE html>
<html lang="en" data-theme="{{ theme or 'prehistoric' }}">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ElbieFit{% endblock %}</title>
    {# HTMX #}
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"
            integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
            crossorigin="anonymous"></script>
    <script>
      document.addEventListener('htmx:configRequest', function(event) {
        const match = document.cookie.split('; ').find(function(row) {
          return row.startsWith('csrf_token=');
        });
        if (match) {
          event.detail.headers['X-CSRFToken'] = match.split('=')[1];
        }
      });
    </script>
    {# Font #}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&display=swap" rel="stylesheet">
    {# Style #}
    <link rel="stylesheet" href="{{ url_for('static', path='CSS/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='CSS/themes.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='CSS/components.css') }}" />
    {% block extra_css %}{% endblock %}
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
  </head>
  <body>
    <header id="app-header" class="flex-row-spaced">

      <a id="brand" href="/">
        <img src="{{ url_for('static', path='images/mascot/' ~ (theme or 'prehistoric') ~ '.png') }}">
        <p>ElbieFit</p>
      </a>

      <button
      class="menu-toggle"
      type="button"
      aria-expanded="false"
      aria-label="Toggle navigation"
      aria-controls="main-nav"
      >☰</button>

      <nav id="main-nav" class="nav-panel">
        <a href="/profile">Profile</a>
        <a href="/workout/all">Workouts</a>
        <a href="/exercise/all">Exercises</a>
      </nav>
    </header>

    <main id="page-content">
      {% block content %}{% endblock %}
    </main>

    <footer id="page-footer">
      <p>&copy; {{ current_year }} ElbieFit</p>
    </footer>
    <script src="{{ url_for('static', path='js/main.js') }}"></script>
    <script src="{{ url_for('static', path='js/number-spinner.js') }}"></script>
    <script>
      document.querySelectorAll('#main-nav a').forEach(link => {
        const href = link.getAttribute('href');
        if (href !== '/' && location.pathname.startsWith(href)) {
          link.classList.add('nav-active');
        }
      });
    </script>
  </body>
</html>
